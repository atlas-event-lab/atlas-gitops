# search-service — CQRS read side. Higher traffic under experiments -> HPA enabled.
# Deploy:  helm upgrade --install search-service ../atlas-service -f search.yaml -n atlas-apps

image:
  repository: ghcr.io/atlas-event-lab/atlas-search-service
  tag: ""

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

podAntiAffinity:
  enabled: false

config:
  KAFKA_BOOTSTRAP_SERVERS: atlas-kafka-bootstrap.atlas-data:9092
  DB_URL: jdbc:postgresql://atlas-pg-pooler-rw.atlas-data:5432/search_db?prepareThreshold=0

envSecret:
  enabled: true
  name: search-secret

extraEnv:
  - name: KEYCLOAK_ISSUER_URI
    valueFrom:
      secretKeyRef:
        name: atlas-issuer
        key: KEYCLOAK_ISSUER_URI
