# user-service — self-service profile, REST-only (no Kafka). Baseline: replica 1, no HPA.
# Deploy:  helm upgrade --install user-service ../atlas-service -f user.yaml -n atlas-apps

image:
  repository: ghcr.io/atlas-event-lab/atlas-user-service
  tag: ""

config:
  DB_URL: jdbc:postgresql://atlas-pg-pooler-rw.atlas-data:5432/user_db?prepareThreshold=0

envSecret:
  enabled: true
  name: user-secret

extraEnv:
  - name: KEYCLOAK_ISSUER_URI
    valueFrom:
      secretKeyRef:
        name: atlas-issuer
        key: KEYCLOAK_ISSUER_URI
