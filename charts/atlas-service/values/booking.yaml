# booking-service — Saga hot-path service. Lean baseline: HPA min 1 (idle = 1 pod),
# scales to 2+ under load/experiments; anti-affinity spreads them once it does.
# Deploy:  helm upgrade --install booking-service ../atlas-service -f booking.yaml -n atlas-apps

image:
  repository: ghcr.io/atlas-event-lab/atlas-booking-service
  tag: ""                      # set by CI to the git-sha / release tag

autoscaling:
  enabled: true
  minReplicas: 1               # lean baseline; raise to 2 during HA/Saga experiments
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

podAntiAffinity:
  enabled: true

config:
  KAFKA_BOOTSTRAP_SERVERS: atlas-kafka-bootstrap.atlas-data:9092
  DB_URL: jdbc:postgresql://atlas-pg-pooler-rw.atlas-data:5432/booking_db?prepareThreshold=0
  FLIGHT_SERVICE_URL: http://flight-service:8080
  HOTEL_SERVICE_URL: http://hotel-service:8080
  REDIS_HOST: redis.atlas-data
  REDIS_PORT: "6379"

envSecret:
  enabled: true
  name: booking-secret

extraEnv:
  - name: KEYCLOAK_ISSUER_URI
    valueFrom:
      secretKeyRef:
        name: atlas-issuer
        key: KEYCLOAK_ISSUER_URI
