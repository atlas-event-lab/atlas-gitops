# inventory-service — Saga participant (reservation locks). Lean baseline: HPA min 1,
# scales to 2+ under load/experiments; anti-affinity spreads them once it does.
# Deploy:  helm upgrade --install inventory-service ../atlas-service -f inventory.yaml -n atlas-apps

image:
  repository: ghcr.io/atlas-event-lab/atlas-inventory-service
  tag: ""

autoscaling:
  enabled: true
  minReplicas: 1               # lean baseline; raise to 2 during HA/Saga experiments
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

podAntiAffinity:
  enabled: true

config:
  KAFKA_BOOTSTRAP_SERVERS: atlas-kafka-bootstrap.atlas-data:9092
  KEYCLOAK_ISSUER_URI: http://keycloak.150.230.182.80.nip.io/realms/atlas
  DB_URL: jdbc:postgresql://atlas-pg-pooler-rw.atlas-data:5432/inventory_db?prepareThreshold=0

envSecret:
  enabled: true
  name: inventory-secret
