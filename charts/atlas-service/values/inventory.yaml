# inventory-service — Saga participant (reservation locks). Lean baseline: HPA min 1,
# scales to 2+ under load/experiments; anti-affinity spreads them once it does.
# Deploy:  helm upgrade --install inventory-service ../atlas-service -f inventory.yaml -n atlas-apps

image:
  repository: ghcr.io/atlas-event-lab/atlas-inventory-service
  tag: ""

autoscaling:
  enabled: true
  minReplicas: 1               # lean baseline; raise to 2 during HA/Saga experiments
  maxReplicas: 3               # 4 -> 3 (cart-inventory-scaling.md §2.2): 3 pods x concurrency 2
  targetCPUUtilizationPercentage: 70   # = 6 consumers = 6 partitions on the hot booking topics

podAntiAffinity:
  enabled: true

# Capped at 3 replicas, so give each pod a bit more memory headroom for the extra saga-listener
# threads. Run 3 used ~1.89Gi across 4 pods (~470Mi/pod), comfortably under this limit; watch
# OOMKilled during the re-run and only raise if needed.
resources:
  requests:
    cpu: 150m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

config:
  KAFKA_BOOTSTRAP_SERVERS: atlas-kafka-bootstrap.atlas-data:9092
  KEYCLOAK_ISSUER_URI: http://keycloak.150.230.182.80.nip.io/realms/atlas
  DB_URL: jdbc:postgresql://atlas-pg-pooler-rw.atlas-data:5432/inventory_db?prepareThreshold=0
  # Concurrency for the dedicated sagaListenerFactory (booking.created/confirmed only) —
  # cart-inventory-scaling.md §2.2. Other listeners stay at the default concurrency 1.
  KAFKA_CONCURRENCY: "2"

envSecret:
  enabled: true
  name: inventory-secret
