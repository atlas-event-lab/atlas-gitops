# hotel-service — hotel catalog (publishes events via outbox). Baseline: replica 1, no HPA.
# Deploy:  helm upgrade --install hotel-service ../atlas-service -f hotel.yaml -n atlas-apps

image:
  repository: ghcr.io/atlas-event-lab/atlas-hotel-service
  tag: ""

config:
  KAFKA_BOOTSTRAP_SERVERS: atlas-kafka-bootstrap.atlas-data:9092
  KEYCLOAK_ISSUER_URI: http://keycloak.150.230.182.80.nip.io/realms/atlas
  DB_URL: jdbc:postgresql://atlas-pg-pooler-rw.atlas-data:5432/hotel_db?prepareThreshold=0
  INVENTORY_SERVICE_URL: http://inventory-service:8080

envSecret:
  enabled: true
  name: hotel-secret
